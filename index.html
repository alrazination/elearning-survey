@media(prefers-reduced-motion:reduce){

// ══════════════════════════════════════════════════════════════
function buildLangSwitcher(){
  const sw=G("lsw");
  // Hide switcher entirely if only one language
  if(ACTIVE_LANGS.length<=1){ sw.style.display="none"; return; }
  ACTIVE_LANGS.forEach((l,i)=>{
    const b=document.createElement("button");
    b.className="lb"+(i===0?" on":"");
    b.textContent=l.label;
    b.dataset.l=l.code;
    b.addEventListener("click",()=>{
      lang=l.code;
      document.querySelectorAll(".lb").forEach(x=>x.classList.toggle("on",x===b));
      render();
    });
    sw.appendChild(b);
  });
}

// ══════════════════════════════════════════════════════════════
//  BUILD QUESTION SCREENS
// ══════════════════════════════════════════════════════════════
function buildScreens(){
  document.querySelectorAll(".qs").forEach(e=>e.remove());
  ans=Array(nQ()).fill("");
  const app=G("app"),contact=G("s-contact");
  bank.forEach((_,i)=>{
    const d=document.createElement("div");
    d.className="screen qs";d.id=`s-q${i}`;
    d.innerHTML=`<div class="qi">
      <div class="ql" id="ql-${i}"></div>
      <h2 id="qh-${i}"></h2>
      <div class="taw">
        <textarea id="ta-${i}" rows="5" maxlength="2000"></textarea>
        <span class="cc" id="cc-${i}">0 / 2000</span>
      </div>
      <p class="hint" id="hi-${i}"></p>
      <div class="row">
        <button class="btn-bk" onclick="goBack(${i})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          <span id="bk-${i}"></span>
        </button>
        <button class="btn-t" id="nx-${i}" onclick="goNext(${i})">
          <span class="sp"></span><span class="bl" id="nx-lbl-${i}"></span>
        </button>
      </div>
    </div>`;
    app.insertBefore(d,contact);
    const ta=G(`ta-${i}`),cc=G(`cc-${i}`);
    ta.addEventListener("input",()=>{ans[i]=ta.value;cc.textContent=ta.value.length+" / 2000";});
    ta.addEventListener("keydown",e=>{if(e.key==="Tab"){e.preventDefault();goNext(i);}});
  });
}

// ══════════════════════════════════════════════════════════════
//  RENDER ALL TEXT  (on init + every language switch)
// ══════════════════════════════════════════════════════════════
function render(){
  G("el-badge").textContent=tx("badge");
  G("el-h1").innerHTML=tx("h1");
  G("el-p").textContent=tx("p");
  G("el-start").textContent=tx("start");
  G("el-m1").textContent=tx("m1");
  G("el-m2").textContent=tx("m2");
  G("el-cth").textContent=tx("cth");
  G("el-cts").textContent=tx("cts");
  G("el-lbe").textContent=tx("lbe");
  G("inp-email").placeholder=tx("phe");
  G("el-lbc").textContent=tx("lbc");
  G("inp-co").placeholder=tx("phc");
  G("el-sub").textContent=tx("sub");
  G("el-bk2").textContent=tx("back");
  G("el-vh").innerHTML=tx("vh");
  G("el-vp").innerHTML=tx("vp");
  G("el-re").textContent=tx("re");
  bank.forEach((_,i)=>{
    const ql=G(`ql-${i}`);if(ql)ql.textContent=tx("prog")(i+1,nQ());
    const qh=G(`qh-${i}`);if(qh)qh.textContent=qT(i);
    const ta=G(`ta-${i}`);if(ta)ta.placeholder=tx("ph");
    const hi=G(`hi-${i}`);if(hi)hi.innerHTML=tx("hint");
    const nx=G(`nx-lbl-${i}`);if(nx)nx.textContent=tx("next");
    const bk=G(`bk-${i}`);if(bk)bk.textContent=tx("back");
  });
  updateProg();
}

// ══════════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════════
function go(id){
  const old=document.querySelector(".screen.active");
  if(old){old.classList.remove("active");old.classList.add("exit");
    setTimeout(()=>old.classList.remove("exit"),600);}
  setTimeout(()=>{const n=G(id);if(n)n.classList.add("active");},80);
}
function showProg(on){
  G("pw").classList.toggle("show",on);
  G("pl").classList.toggle("show",on);
}
function updateProg(){
  if(cur<0||cur>=nQ())return;
  G("pb").style.width=((cur+1)/nQ()*100)+"%";
  G("pl").textContent=tx("prog")(cur+1,nQ());
}

G("btn-start").addEventListener("click",()=>{
  cur=0;go("s-q0");showProg(true);updateProg();
  setTimeout(()=>G("ta-0")&&G("ta-0").focus(),420);
});

function goBack(i){
  if(i===0){cur=-1;go("s-welcome");showProg(false);}
  else{cur=i-1;go(`s-q${cur}`);updateProg();
    setTimeout(()=>G(`ta-${cur}`)&&G(`ta-${cur}`).focus(),420);}
}
function goNext(i){
  if(i<nQ()-1){cur=i+1;go(`s-q${cur}`);updateProg();
    setTimeout(()=>G(`ta-${cur}`)&&G(`ta-${cur}`).focus(),420);}
  else{cur=nQ();go("s-contact");showProg(false);
    setTimeout(()=>G("inp-email")&&G("inp-email").focus(),420);}
}

G("btn-ctbk").addEventListener("click",()=>{
  cur=nQ()-1;go(`s-q${cur}`);showProg(true);updateProg();
});

// ══════════════════════════════════════════════════════════════
//  SUBMIT  (no-cors POST — works without CORS headers)
// ══════════════════════════════════════════════════════════════
G("btn-sub").addEventListener("click",async()=>{
  const em=G("inp-email");em.classList.remove("err");
  if(!em.value.trim()||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.value)){
    em.classList.add("err");showToast(tx("errem"));em.focus();return;
  }
  const btn=G("btn-sub");btn.classList.add("busy");
  try{
    if(APPS_SCRIPT_URL&&APPS_SCRIPT_URL!=="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){
      const payload=JSON.stringify({
        action:"submitAnswers",
        timestamp:new Date().toISOString(),
        language:lang,
        email:em.value.trim(),
        company:G("inp-co").value.trim(),
        answers:bank.map((q,i)=>({question:q[lang]||q.en,answer:ans[i]||""}))
      });
      fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",
        headers:{"Content-Type":"text/plain"},body:payload});
      await new Promise(r=>setTimeout(r,800)); // brief pause, fire-and-forget
    }
  }catch(e){/* non-fatal */}
  btn.classList.remove("busy");
  showProg(false);go("s-victory");launchConfetti();
});

// ══════════════════════════════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════════════════════════════
function launchConfetti(){
  const cv=G("cv"),cx=cv.getContext("2d");
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=["#F5C842","#3ECFCF","#ff9f43","#fff","#a78bfa","#fb7185","#34d399"];
  const ps=Array.from({length:170},()=>({
    x:Math.random()*cv.width,y:-20-Math.random()*220,
    r:3.5+Math.random()*6,d:1.4+Math.random()*2.8,
    c:cols[~~(Math.random()*cols.length)],ts:.08+Math.random()*.28,a:0,sq:Math.random()>.45
  }));
  let f=0;
  (function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      cx.save();cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,1-f/215);
      cx.translate(p.x,p.y);cx.rotate(p.a*Math.PI/180);
      p.sq?cx.fillRect(-p.r/2,-p.r/2,p.r*2,p.r):(cx.beginPath(),cx.arc(0,0,p.r/2,0,2*Math.PI),cx.fill());
      cx.restore();
      p.y+=p.d;p.x+=Math.sin(p.a*.018)*1.3;p.a+=p.ts;
      if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width;}
    });
    if(++f<235)requestAnimationFrame(draw);
    else cx.clearRect(0,0,cv.width,cv.height);
  })();
}

// ══════════════════════════════════════════════════════════════
//  INIT  (synchronous — no fetch, no waiting)
// ══════════════════════════════════════════════════════════════
buildLangSwitcher();
buildScreens();
render();
</script>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1B35;--gold:#F5C842;--gold2:#e6b730;
  --teal:#3ECFCF;--white:#fff;--muted:rgba(255,255,255,.55);--r:16px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);overflow:hidden}

/* Lang switcher */
#lang-sw{position:fixed;top:18px;left:20px;z-index:300;display:flex;gap:4px}
.lb{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.45);
  font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:5px 9px;border-radius:8px;cursor:pointer;transition:all .2s}
.lb:hover{color:var(--white);border-color:rgba(255,255,255,.3)}
.lb.on{background:rgba(62,207,207,.18);border-color:var(--teal);color:var(--teal)}

/* Progress */
#pw{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.08);
  z-index:200;opacity:0;transition:opacity .4s;pointer-events:none}
#pw.show{opacity:1}
#pb{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--gold));
  transition:width .55s cubic-bezier(.4,0,.2,1);border-radius:0 4px 4px 0}
#pl{position:fixed;top:14px;right:20px;z-index:201;font-size:11px;font-weight:600;
  letter-spacing:.08em;color:var(--muted);opacity:0;transition:opacity .4s;
  text-transform:uppercase;pointer-events:none}
#pl.show{opacity:1}

/* Screens */
#app{position:relative;width:100%;height:100%;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  padding:60px 24px 40px;opacity:0;transform:translateY(60px);
  transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);
  pointer-events:none}
.screen.active{opacity:1;transform:translateY(0);pointer-events:all}
.screen.exit{opacity:0;transform:translateY(-60px)}

/* Welcome */
.wi{max-width:640px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(245,200,66,.12);
  border:1px solid rgba(245,200,66,.3);border-radius:100px;padding:8px 18px;
  font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.04em;
  text-transform:uppercase;margin-bottom:32px}
.wi h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5.5vw,3.4rem);
  line-height:1.12;margin-bottom:24px}
.hl{background:linear-gradient(135deg,var(--gold) 0%,#ff9f43 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wi>p{font-size:clamp(15px,2vw,17px);line-height:1.7;color:rgba(255,255,255,.72);
  margin-bottom:44px;max-width:520px;margin-left:auto;margin-right:auto}
.meta{margin-top:28px;font-size:13px;color:rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.meta span{display:flex;align-items:center;gap:5px}

/* Buttons */
.btn-g{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:var(--navy);
  font-family:'Inter',sans-serif;font-weight:700;font-size:16px;padding:16px 40px;
  border-radius:100px;border:none;cursor:pointer;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 24px rgba(245,200,66,.35)}
.btn-g:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,200,66,.45)}
.btn-g:active{transform:translateY(0)}
.arr{font-size:18px;transition:transform .2s}
.btn-g:hover .arr{transform:translateX(4px)}

.btn-t{position:relative;display:inline-flex;align-items:center;gap:8px;
  background:var(--teal);color:var(--navy);font-family:'Inter',sans-serif;
  font-weight:700;font-size:15px;padding:13px 32px;border-radius:100px;border:none;
  cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(62,207,207,.3)}
.btn-t:hover{background:#35bebe;transform:translateY(-2px);box-shadow:0 8px 28px rgba(62,207,207,.4)}
.btn-t:active{transform:translateY(0)}
.btn-t.busy{pointer-events:none}
.btn-t.busy .bl{opacity:0}
.sp{position:absolute;display:none;width:18px;height:18px;
  border:2px solid rgba(15,27,53,.25);border-top-color:var(--navy);
  border-radius:50%;animation:spin .7s linear infinite}
.btn-t.busy .sp{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-bk{background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.4);
  font-family:'Inter',sans-serif;font-size:14px;display:flex;align-items:center;

.btn-bk:hover{color:rgba(255,255,255,.85)}
.row{display:flex;align-items:center;justify-content:space-between;margin-top:22px}

.taw{position:relative}
textarea{width:100%;min-height:155px;background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.14);border-radius:var(--r);color:var(--white);
  font-family:'Inter',sans-serif;font-size:16px;line-height:1.65;

  transition:border-color .25s,background .25s}
textarea::placeholder{color:rgba(255,255,255,.28)}
textarea:focus{border-color:var(--teal);background:rgba(255,255,255,.09)}

  color:rgba(255,255,255,.28);pointer-events:none}
.hint{font-size:12px;color:rgba(255,255,255,.32);margin-top:9px}

/* Contact */
.ci{max-width:520px;width:100%}

  justify-content:center;font-size:24px;margin-bottom:24px}
.ci h2{font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,3.2vw,2rem);
  line-height:1.25;margin-bottom:10px}
.csub{font-size:15px;color:rgba(255,255,255,.58);line-height:1.65;margin-bottom:30px}
.fs{display:flex;flex-direction:column;gap:16px;margin-bottom:26px}
.fi{display:flex;flex-direction:column;gap:7px}
.fi label{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:rgba(255,255,255,.45)}
.fi input{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.14);
  border-radius:var(--r);color:var(--white);font-family:'Inter',sans-serif;
  font-size:16px;padding:14px 18px;outline:none;transition:border-color .25s,background .25s}
.fi input::placeholder{color:rgba(255,255,255,.28)}
.fi input:focus{border-color:var(--gold);background:rgba(255,255,255,.09)}
.fi input.err{border-color:#ff4d6d}

/* Victory */
.vi{max-width:540px;text-align:center}
.trophy{width:92px;height:92px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold) 0%,#ff9f43 100%);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;font-size:42px;
  animation:pglow 2.2s ease-in-out infinite}
@keyframes pglow{
  0%,100%{box-shadow:0 0 0 0 rgba(245,200,66,.4)}
  50%{box-shadow:0 0 0 22px rgba(245,200,66,0)}}
.vi h2{font-family:'DM Serif Display',serif;font-size:clamp(1.7rem,4vw,2.55rem);
  line-height:1.2;margin-bottom:18px}
.vi p{font-size:16px;line-height:1.8;color:rgba(255,255,255,.7);margin-bottom:34px}

/* Loader */
#loader{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;z-index:400;
  transition:opacity .4s}
#loader.gone{opacity:0;pointer-events:none}
.dots{display:flex}
.dot{width:10px;height:10px;border-radius:50%;background:var(--teal);margin:0 5px;
  animation:bop .8s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s;background:var(--gold)}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-13px);opacity:1}}
#lmsg{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:.04em}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#ff4d6d;color:#fff;padding:11px 22px;border-radius:100px;
  font-size:14px;font-weight:500;z-index:500;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events:none;white-space:nowrap;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Confetti */
#cv{position:fixed;inset:0;pointer-events:none;z-index:450}

/* Orbs */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:rgba(62,207,207,.07);top:-150px;right:-100px}
.o2{width:400px;height:400px;background:rgba(245,200,66,.06);bottom:-120px;left:-80px}

@media(max-width:520px){
  .wi h1,.qi h2,.ci h2{font-size:1.45rem}
  textarea,.fi input{font-size:15px}
  #lang-sw{top:auto;bottom:14px;left:50%;transform:translateX(-50%)}
  .screen{padding-bottom:64px}
}
@media(prefers-reduced-motion:reduce){
  *{transition-duration:.01ms!important;animation-duration:.01ms!important}
}
</style>
</head>

let ans   = [];
let cur   = -1;  // -1=welcome  0..n-1=questions  n=contact

// ─────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────
const t   = k  => TX[lang][k] ?? TX.en[k] ?? k;
const el  = id => document.getElementById(id);
const nQ  = () => bank.length;
const qT  = i  => bank[i][lang] || bank[i].en || "";

function toast(msg, ms=4200){
  const e=el("toast"); e.textContent=msg; e.classList.add("show");
  setTimeout(()=>e.classList.remove("show"), ms);
}

function hideLoader(){
  const l=el("loader");
  l.classList.add("gone");
  setTimeout(()=>l.style.display="none", 450);
}

// ─────────────────────────────────────────────────────────────
//  FETCH QUESTIONS FROM SHEETS
//  Uses a JSONP-style approach via a <script> tag to avoid CORS,
//  with a 6-second timeout that falls back to FALLBACK quietly.
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
//  FETCH via JSONP  — bypasses CORS entirely for GET requests.
//  We inject a <script> tag pointing at the Apps Script URL
//  with a callback parameter. Apps Script returns
//  callback({questions:[...]}) which the browser executes.
//  Falls back to built-in questions after 8 seconds.
// ─────────────────────────────────────────────────────────────
function loadQuestions(){
  return new Promise(resolve=>{
    if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){
      resolve(); return;
    }

    let done = false;
    const cbName = "__sheetsCB_" + Date.now();

    const finish = (questions)=>{
      if(done) return;
      done = true;
      if(questions && questions.length) bank = questions;
      // clean up
      delete window[cbName];
      const s = document.getElementById(cbName);
      if(s) s.remove();
      resolve();
    };

    // Timeout fallback
    const timer = setTimeout(()=>{
      console.warn("Sheets timeout — using built-in questions.");
      finish(null);
    }, 8000);

    // JSONP callback — Apps Script will call this
    window[cbName] = (data)=>{
      clearTimeout(timer);
      finish(data && data.questions ? data.questions : null);
    };

    // Inject script tag
    const script = document.createElement("script");
    script.id  = cbName;
    script.src = APPS_SCRIPT_URL + "?action=getQuestions&callback=" + cbName;
    script.onerror = ()=>{ clearTimeout(timer); console.warn("JSONP script error — using built-in questions."); finish(null); };
    document.head.appendChild(script);
  });
}

// ─────────────────────────────────────────────────────────────
//  SUBMIT  (no-cors POST — avoids preflight, fire-and-forget)
// ─────────────────────────────────────────────────────────────
function submitData(){
  return new Promise(resolve=>{
    if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"){
      console.log("Demo — answers:", ans); resolve(); return;
    }
    const payload = JSON.stringify({
      action:"submitAnswers",
      timestamp: new Date().toISOString(),
      language: lang,
      email:    el("inp-email").value.trim(),
      company:  el("inp-co").value.trim(),
      answers:  bank.map((q,i)=>({question:q[lang]||q.en, answer:ans[i]||""}))
    });
    // no-cors: request goes through, we just can't read the response
    fetch(APPS_SCRIPT_URL, {method:"POST", mode:"no-cors",
      headers:{"Content-Type":"text/plain"}, body:payload})
      .finally(()=>resolve());
    // Also resolve after 5s max so UI never hangs
    setTimeout(resolve, 5000);
  });
}

// ─────────────────────────────────────────────────────────────
//  BUILD QUESTION SCREENS  (called once after bank is ready)
// ─────────────────────────────────────────────────────────────
function buildScreens(){
  ans = Array(nQ()).fill("");
  // Remove any old question screens
  document.querySelectorAll(".qs").forEach(e=>e.remove());
  const app     = el("app");
  const contact = el("s-contact");

  bank.forEach((q,i)=>{
    const d=document.createElement("div");
    d.className="screen qs"; d.id=`s-q${i}`;
    d.innerHTML=`
      <div class="qi">
        <div class="ql" id="ql-${i}"></div>
        <h2 id="qh-${i}"></h2>
        <div class="taw">
          <textarea id="ta-${i}" rows="5" maxlength="2000"></textarea>
          <span class="cc" id="cc-${i}">0 / 2000</span>
        </div>
        <p class="hint" id="hi-${i}"></p>
        <div class="row">
          <button class="btn-bk" onclick="goBack(${i})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            <span id="bk-${i}"></span>
          </button>
          <button class="btn-t" id="nx-${i}" onclick="goNext(${i})">
            <span class="sp"></span>
            <span class="bl" id="nx-lbl-${i}"></span>
          </button>
        </div>
      </div>`;
    app.insertBefore(d, contact);

    const ta=el(`ta-${i}`), cc=el(`cc-${i}`);
    ta.addEventListener("input",()=>{ ans[i]=ta.value; cc.textContent=`${ta.value.length} / 2000`; });
    ta.addEventListener("keydown",e=>{ if(e.key==="Tab"){e.preventDefault();goNext(i);} });
  });
}

// ─────────────────────────────────────────────────────────────
//  RENDER TEXT  (call after buildScreens and on every lang switch)
// ─────────────────────────────────────────────────────────────
function render(){
  // Welcome
  el("el-badge").textContent = t("badge");
  el("el-h1").innerHTML      = t("h1");
  el("el-p").textContent     = t("p");
  el("el-start").textContent = t("start");
  el("el-m1").textContent    = t("m1");
  el("el-m2").textContent    = t("m2");

  // Contact
  el("el-cth").textContent   = t("cth");
  el("el-cts").textContent   = t("cts");
  el("el-lbe").textContent   = t("lbe");
  el("inp-email").placeholder= t("phe");
  el("el-lbc").textContent   = t("lbc");
  el("inp-co").placeholder   = t("phc");
  el("el-sub").textContent   = t("sub");
  el("el-bk2").textContent   = t("back");

  // Victory
  el("el-vh").innerHTML      = t("vh");
  el("el-vp").innerHTML      = t("vp");
  el("el-re").textContent    = t("re");

  // Loader
  el("lmsg").textContent     = t("load");

  // Question screens
  bank.forEach((_,i)=>{
    const ql=el(`ql-${i}`); if(ql) ql.textContent = t("prog")(i+1, nQ());
    const qh=el(`qh-${i}`); if(qh) qh.textContent = qT(i);
    const ta=el(`ta-${i}`); if(ta) ta.placeholder  = t("ph");
    const hi=el(`hi-${i}`); if(hi) hi.innerHTML    = t("hint");
    const nx=el(`nx-lbl-${i}`); if(nx) nx.textContent = i<nQ()-1 ? t("next") : t("last");
    const bk=el(`bk-${i}`);     if(bk) bk.textContent = t("back");
  });

  updateProgressLabel();
}

// ─────────────────────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────────────────────
function go(id){
  const old=document.querySelector(".screen.active");
  if(old){ old.classList.remove("active"); old.classList.add("exit");
    setTimeout(()=>old.classList.remove("exit"),600); }
  setTimeout(()=>{ const n=el(id); if(n) n.classList.add("active"); },80);
}

function showProgress(on){
  el("pw").classList.toggle("show",on);
  el("pl").classList.toggle("show",on);
}

function updateProgressLabel(){
  if(cur>=0 && cur<nQ()){
    el("pb").style.width=((cur+1)/nQ()*100)+"%";
    el("pl").textContent=t("prog")(cur+1,nQ());
  }
}

// Start button
el("btn-start").addEventListener("click",()=>{
  cur=0; go("s-q0"); showProgress(true); updateProgressLabel();
  setTimeout(()=>el("ta-0")?.focus(),420);
});

function goBack(i){
  if(i===0){ cur=-1; go("s-welcome"); showProgress(false); }
  else { cur=i-1; go(`s-q${cur}`); updateProgressLabel();
    setTimeout(()=>el(`ta-${cur}`)?.focus(),420); }
}

function goNext(i){
  if(i<nQ()-1){
    cur=i+1; go(`s-q${cur}`); updateProgressLabel();
    setTimeout(()=>el(`ta-${cur}`)?.focus(),420);
  } else {
    cur=nQ(); go("s-contact"); showProgress(false);
    setTimeout(()=>el("inp-email")?.focus(),420);
  }
}

el("btn-ctbk").addEventListener("click",()=>{
  cur=nQ()-1; go(`s-q${cur}`); showProgress(true); updateProgressLabel();
});

// Submit
el("btn-sub").addEventListener("click", async()=>{
  const em=el("inp-email");
  em.classList.remove("err");
  if(!em.value.trim()||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.value.trim())){
    em.classList.add("err"); toast(t("errem")); em.focus(); return;
  }
  const btn=el("btn-sub"); btn.classList.add("busy");
  try{ await submitData(); }
  catch(e){ toast(t("errsub")); btn.classList.remove("busy"); return; }
  btn.classList.remove("busy");
  showProgress(false); go("s-victory"); launchConfetti();
});

// Language switch
document.querySelectorAll(".lb").forEach(b=>{
  b.addEventListener("click",()=>{
    lang=b.dataset.l;
    document.querySelectorAll(".lb").forEach(x=>x.classList.toggle("on",x===b));
    render();
  });
});

// ─────────────────────────────────────────────────────────────
//  CONFETTI
// ─────────────────────────────────────────────────────────────
function launchConfetti(){
  const cv=el("cv"),cx=cv.getContext("2d");
  cv.width=innerWidth; cv.height=innerHeight;
  const cols=["#F5C842","#3ECFCF","#ff9f43","#fff","#a78bfa","#fb7185","#34d399"];
  const ps=Array.from({length:170},()=>({
    x:Math.random()*cv.width, y:-20-Math.random()*220,
    r:3.5+Math.random()*6, d:1.4+Math.random()*2.8,
    c:cols[~~(Math.random()*cols.length)],
    ts:.08+Math.random()*.28, a:0, sq:Math.random()>.45
  }));
  let f=0;
  (function draw(){
    cx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      cx.save(); cx.fillStyle=p.c; cx.globalAlpha=Math.max(0,1-f/215);
      cx.translate(p.x,p.y); cx.rotate(p.a*Math.PI/180);
      p.sq?cx.fillRect(-p.r/2,-p.r/2,p.r*2,p.r):(cx.beginPath(),cx.arc(0,0,p.r/2,0,2*Math.PI),cx.fill());
      cx.restore();
      p.y+=p.d; p.x+=Math.sin(p.a*.018)*1.3; p.a+=p.ts;
      if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width;}
    });
    if(++f<235) requestAnimationFrame(draw);
    else cx.clearRect(0,0,cv.width,cv.height);
  })();
}

// ─────────────────────────────────────────────────────────────
//  INIT  — always hides loader even if everything fails
// ─────────────────────────────────────────────────────────────
(async()=>{
  try {
    await loadQuestions();
    buildScreens();
    render();
  } catch(e){
    console.error("Init error:", e);
    bank = FALLBACK.map(q=>({...q}));
    try { buildScreens(); render(); } catch(e2){ console.error(e2); }
  } finally {
    hideLoader();
  }
  // Start live-sync after initial load
  startLiveSync();
})();

// ─────────────────────────────────────────────────────────────
//  LIVE SYNC  — polls Sheets every 30s, rebuilds silently
//  Only updates when user is on the welcome screen so a live
//  respondent is never interrupted mid-survey.
// ─────────────────────────────────────────────────────────────
function startLiveSync(){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL==="YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") return;

  const INTERVAL = 30000; // 30 seconds

  async function poll(){
    // Don't disturb someone who has already started the survey
    if(cur !== -1) return;

    const prevJSON = JSON.stringify(bank);
    await loadQuestions();
    const newJSON  = JSON.stringify(bank);

    if(newJSON !== prevJSON){
      // Questions changed — rebuild screens silently
      console.log("Sheets updated — refreshing questions.");
      ans = Array(nQ()).fill("");
      buildScreens();
      render();
      // Flash a subtle indicator in the progress label area so
      // the developer/admin can see the sync happened
      const indicator = document.createElement("div");
      indicator.style.cssText = [
        "position:fixed","bottom:20px","right:20px","z-index:600",
        "background:rgba(62,207,207,.18)","border:1px solid var(--teal)",
        "color:var(--teal)","font-size:11px","font-weight:700",
        "padding:6px 14px","border-radius:100px","letter-spacing:.06em",
        "text-transform:uppercase","opacity:1","transition:opacity 1s",
        "pointer-events:none"
      ].join(";");
      indicator.textContent = "✓ Questions updated";
      document.body.appendChild(indicator);
      setTimeout(()=>indicator.style.opacity="0", 2500);
      setTimeout(()=>indicator.remove(), 3600);
    }
  }

  // Poll on page visibility change too (user switches back to tab)
  document.addEventListener("visibilitychange",()=>{
    if(!document.hidden) poll();
  });

  setInterval(poll, INTERVAL);
}
</script>

// ── REPLACE YOUR_SPREADSHEET_ID_HERE with your real Spreadsheet ID ──
const SS_ID = "YOUR_SPREADSHEET_ID_HERE";

// doGet handles both regular fetch AND JSONP (callback= param)
function doGet(e) {
  var questions = [];
  var sheet = SpreadsheetApp.openById(SS_ID).getSheetByName("Questions");
  var rows  = sheet.getDataRange().getValues();
  rows.shift(); // skip header row
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (r[0] || r[1] || r[2] || r[3]) {
      questions.push({ en: r[0]||"", it: r[1]||"", es: r[2]||"", de: r[3]||"" });
    }
  }

  var json = JSON.stringify({ questions: questions });

  // JSONP support — if ?callback=xxx is present, wrap in callback(...)
  var cb = (e && e.parameter && e.parameter.callback) ? e.parameter.callback : null;
  if (cb) {
    // Validate callback name (letters, digits, underscores only — security)
    cb = cb.replace(/[^a-zA-Z0-9_]/g, "");
    json = cb + "(" + json + ")";
  }

  return ContentService.createTextOutput(json)
    .setMimeType(cb ? ContentService.MimeType.JAVASCRIPT : ContentService.MimeType.JSON);
}

function doPost(e) {
  var body = JSON.parse(e.postData.contents);
  var ss   = SpreadsheetApp.openById(SS_ID);
  var resp = ss.getSheetByName("Responses");
  if (!resp) {
    resp = ss.insertSheet("Responses");
    resp.appendRow(["Timestamp","Language","Email","Company","Question","Answer"]);
  }
  if (body.action === "submitAnswers") {
    for (var i = 0; i < body.answers.length; i++) {
      var a = body.answers[i];
      resp.appendRow([body.timestamp, body.language, body.email, body.company, a.question, a.answer]);
    }
  }
  return ContentService.createTextOutput(JSON.stringify({ status: "ok" }))
    .setMimeType(ContentService.MimeType.JSON);
}
